name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: Build assets & run tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - name: Setup PHP 8.3
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, dom, xml, bcmath, ctype, fileinfo, tokenizer, pdo_sqlite, sqlite3
          coverage: pcov

      - name: Cache Composer packages
        uses: actions/cache@v6
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-

      - name: Install PHP dependencies
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - name: Run front-end tests (Vitest) with coverage
        run: npm run test:js:coverage

      # Feature tests render Inertia pages, which require the Vite manifest.
      - name: Build front-end assets
        run: npm run build

      - name: Prepare environment
        run: |
          cp .env.example .env
          php artisan key:generate

      - name: Run tests with coverage
        run: php artisan test --coverage --min=90

  deploy:
    name: Deploy to Render
    needs: test
    # Only after tests pass, and only on a push to main (never on PRs).
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to Render and wait for it to go live
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
        run: |
          set -euo pipefail

          if [ -z "${RENDER_API_KEY:-}" ] || [ -z "${RENDER_SERVICE_ID:-}" ]; then
            echo "::warning::RENDER_API_KEY / RENDER_SERVICE_ID secrets are not set — skipping deploy. Add them in repo Settings → Secrets."
            exit 0
          fi

          api="https://api.render.com/v1/services/${RENDER_SERVICE_ID}"
          auth="Authorization: Bearer ${RENDER_API_KEY}"

          echo "Tests passed — triggering Render deploy…"
          deploy_id=$(curl -fsS -X POST "${api}/deploys" \
            -H "${auth}" -H "Content-Type: application/json" -d '{}' \
            | jq -r '.id')

          if [ -z "$deploy_id" ] || [ "$deploy_id" = "null" ]; then
            echo "::error::Could not create a Render deploy (check RENDER_API_KEY / RENDER_SERVICE_ID)."
            exit 1
          fi
          echo "Deploy created: ${deploy_id}"
          echo "Live logs: https://dashboard.render.com → service → Events"

          # Poll until the deploy reaches a terminal state (timeout ~20 min).
          deadline=$(( $(date +%s) + 1200 ))
          while :; do
            status=$(curl -fsS "${api}/deploys/${deploy_id}" -H "${auth}" | jq -r '.status')
            echo "status: ${status}"
            case "$status" in
              live)
                echo "✅ Deploy is live."
                exit 0 ;;
              build_failed|update_failed|pre_deploy_failed|canceled|deactivated)
                echo "::error::Render deploy ended with status '${status}'."
                exit 1 ;;
            esac
            if [ "$(date +%s)" -ge "$deadline" ]; then
              echo "::error::Timed out waiting for the Render deploy to go live (last status: ${status})."
              exit 1
            fi
            sleep 15
          done
