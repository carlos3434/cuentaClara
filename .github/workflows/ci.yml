name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: Build assets & run tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - name: Setup PHP 8.3
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, dom, xml, bcmath, ctype, fileinfo, tokenizer, pdo_sqlite, sqlite3
          coverage: pcov

      - name: Cache Composer packages
        uses: actions/cache@v6
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-

      - name: Install PHP dependencies
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - name: Run front-end tests (Vitest) with coverage
        run: npm run test:js:coverage

      # Feature tests render Inertia pages, which require the Vite manifest.
      - name: Build front-end assets
        run: npm run build

      - name: Prepare environment
        run: |
          cp .env.example .env
          php artisan key:generate

      - name: Run tests with coverage
        run: php artisan test --coverage --min=90

  deploy:
    name: Deploy to Render
    needs: test
    # Only after tests pass, and only on a push to main (never on PRs).
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - name: Trigger Render deploy
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$RENDER_DEPLOY_HOOK_URL" ]; then
            echo "::warning::RENDER_DEPLOY_HOOK_URL secret is not set — skipping deploy. Add it in repo Settings → Secrets."
            exit 0
          fi
          echo "Tests passed — triggering Render deploy…"
          curl -fsS -X POST "$RENDER_DEPLOY_HOOK_URL"
          echo "Render deploy triggered."
